name: Cyber Threat Ingestion

on:
  schedule:
    - cron: '0 * * * *'  # Runs every 1 hour (at the start of the hour)
  workflow_dispatch:      # Allows manual trigger from GitHub UI

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          cd python-scraper
          pip install -r requirements.txt

      - name: Execute Threat Ingestion
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          LOG_LEVEL: INFO
          CERT_IN_ENABLED: 'true'
          NEWS_SCRAPING_ENABLED: 'true'
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          cd python-scraper
          python one_shot_scrape.py

      - name: Trigger Risk Recalculation
        run: |
          curl -X POST https://cyber-feed-backend.onrender.com/api/sectors/recalculate
